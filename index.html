<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Заяц против тигра</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="game-shell">
      <section class="topbar" aria-label="Настройки игры">
        <div>
          <h1>Заяц против тигра</h1>
          <p>Пробел или тап: прыгнуть. Убегай как можно дольше.</p>
        </div>

        <div class="scoreboard" aria-live="polite">
          <span>Счет</span>
          <strong id="score">0</strong>
        </div>
      </section>

      <section class="controls" aria-label="Сложность">
        <label>
          <span>Скорость</span>
          <input id="speedSlider" type="range" min="1" max="10" value="4">
          <output id="speedValue">4</output>
        </label>

        <label>
          <span>Препятствия</span>
          <input id="difficultySlider" type="range" min="1" max="10" value="4">
          <output id="difficultyValue">4</output>
        </label>
      </section>

      <section class="game-card" aria-label="Игровое поле">
        <canvas id="game" width="960" height="360"></canvas>

        <div id="message" class="message">
          <h2>Нажми пробел</h2>
          <p>Заяц прыгает через препятствия, а тигр постепенно догоняет.</p>
          <button id="startButton" type="button">Начать игру</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
